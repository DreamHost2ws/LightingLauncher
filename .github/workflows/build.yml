name: Build AG Launcher

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Build EXE
        run: npm run build

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: AG-Launcher
          path: dist/**
